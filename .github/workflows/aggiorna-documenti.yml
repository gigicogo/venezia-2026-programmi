name: Aggiorna documents.json

on:
  push:
    paths:
      - 'materiali/**'
      - '.github/workflows/aggiorna-documenti.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica i file del repository
        uses: actions/checkout@v4

      - name: Attiva Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Crea documents.json dai testi
        run: |
          python <<'PY'
          import os, json

          cartella = "materiali"
          output = "site/documents.json"
          documenti = []

          for nome in sorted(os.listdir(cartella)):
              if not nome.endswith(".md"):
                  continue
              if nome == "README.md":
                  continue

              percorso = os.path.join(cartella, nome)
              with open(percorso, "r", encoding="utf-8") as f:
                  testo = f.read().strip()

              righe = [r.strip() for r in testo.splitlines() if r.strip()]
              titolo = righe[0].replace("#", "").strip() if righe else nome
              corpo = " ".join(righe[1:]).strip() if len(righe) > 1 else testo[:500]

              documenti.append({
                  "title": titolo,
                  "source": nome,
                  "text": corpo
              })

          with open(output, "w", encoding="utf-8") as f:
              json.dump(documenti, f, ensure_ascii=False, indent=2)
          PY

      - name: Salva il file aggiornato
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Aggiorna documents.json
          file_pattern: site/documents.json
