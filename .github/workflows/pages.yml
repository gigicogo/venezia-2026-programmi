name: Pubblica sito

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Scarica i file del repository
        uses: actions/checkout@v4

      - name: Prepara i file del sito
        run: |
          mkdir -p _site
          cp -r site/* _site/

      - name: Carica i file del sito
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Pubblica su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
