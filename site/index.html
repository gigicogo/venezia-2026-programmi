<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elezioni Venezia 2026 - Ricerca documenti</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f7f9;
      color: #222;
    }
    .box {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      line-height: 1.5;
    }
    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
    }
    .note {
      margin-top: 12px;
      color: #666;
      font-size: 14px;
    }
    .result {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      background: #fafafa;
    }
    .title {
      font-weight: bold;
      margin-bottom: 6px;
    }
    .meta {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Elezioni Venezia 2026</h1>
    <p>Ricerca semplice nei documenti del repository.</p>

    <input id="searchBox" type="text" placeholder="Scrivi una parola, per esempio: mobilità, casa, turismo" />

    <div class="note">
      Scrivi una parola chiave per cercare nei documenti caricati.
    </div>

    <div id="results"></div>
  </div>

  <script>
    const searchBox = document.getElementById("searchBox");
    const results = document.getElementById("results");
    let documents = [];

    async function loadDocuments() {
      const response = await fetch("./documents.json?ts=" + Date.now(), { cache: "no-store" });
      documents = await response.json();
    }

    function searchDocuments(query) {
      const q = query.toLowerCase().trim();

      if (!q) {
        results.innerHTML = "";
        return;
      }

      const found = documents.filter(doc => {
        const text = (doc.title + " " + doc.text + " " + (doc.source || "")).toLowerCase();
        return text.includes(q);
      }).slice(0, 10);

      if (found.length === 0) {
        results.innerHTML = "<div class='result'>Nessun risultato trovato.</div>";
        return;
      }

      results.innerHTML = found.map(doc => `
        <div class="result">
          <div class="title">${doc.title}</div>
          <div class="meta">${doc.source || ""}</div>
          <div>${doc.text.slice(0, 300)}...</div>
        </div>
      `).join("");
    }

    searchBox.addEventListener("input", (e) => {
      searchDocuments(e.target.value);
    });

    loadDocuments().catch(() => {
      results.innerHTML = "<div class='result'>Errore nel caricamento dei documenti.</div>";
    });
  </script>
</body>
</html>
